
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>adoiz | City-Locked Marketplace</title>
    
    <!-- PWA Primary Metadata -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="adoiz">
    <link rel="apple-touch-icon" href="https://picsum.photos/seed/adoiz/192">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
        .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0); }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e5e7eb; border-radius: 20px; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .front-view h1, 
        .front-view h2, 
        .front-view h3, 
        .front-view h4, 
        .front-view h5, 
        .front-view h6 {
            font-size: 1rem !important;
        }
    </style>
    
    <!-- Dynamic PWA Manifest and Theme Color Injection -->
    <script>
      (function() {
        const storedConfig = localStorage.getItem('adoiz_config');
        let config = { 
          siteName: 'adoiz', 
          branding: { primaryColor: '#1a73e8', appName: 'adoiz', pwaIcon: 'https://picsum.photos/seed/adoiz/192' } 
        };
        
        if (storedConfig) {
          try { config = JSON.parse(storedConfig); } catch(e) {}
        }

        // Set Theme Color Meta
        const metaTheme = document.createElement('meta');
        metaTheme.name = "theme-color";
        metaTheme.content = config.branding?.statusColor || config.branding?.primaryColor || "#1a73e8";
        document.head.appendChild(metaTheme);

        // Generate Dynamic Manifest
        const manifest = {
          "name": config.branding?.appName || config.siteName || "adoiz",
          "short_name": config.branding?.appName || config.siteName || "adoiz",
          "start_url": "/",
          "display": "standalone",
          "background_color": "#ffffff",
          "theme_color": config.branding?.primaryColor || "#1a73e8",
          "icons": [
            {
              "src": config.branding?.pwaIcon || "https://picsum.photos/seed/adoiz/192",
              "sizes": "192x192",
              "type": "image/png",
              "purpose": "any maskable"
            },
            {
              "src": config.branding?.pwaIcon || "https://picsum.photos/seed/adoiz/512",
              "sizes": "512x512",
              "type": "image/png"
            }
          ]
        };

        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        const link = document.createElement('link');
        link.rel = 'manifest';
        link.href = manifestURL;
        document.head.appendChild(link);
      })();
    </script>

    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@19.0.0",
        "react/": "https://esm.sh/react@19.0.0/",
        "react-dom": "https://esm.sh/react-dom@19.0.0",
        "react-dom/": "https://esm.sh/react-dom@19.0.0/",
        "@google/genai": "https://esm.sh/@google/genai@1.3.0"
      }
    }
    </script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div id="root"></div>
    <div id="fb-root"></div>
    <script async defer crossorigin="anonymous" src="https://connect.facebook.net/en_US/sdk.js"></script>
    
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('SW Registered', reg))
            .catch(err => console.log('SW Registration Failed', err));
        });
      }
    </script>
    
    <script type="module" src="./index.tsx"></script>
</body>
</html>
